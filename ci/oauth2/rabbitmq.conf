# OAuth 2 test node for local development.
# Runs on port 5680 to avoid conflicting with the regular test node.

listeners.tcp.default = 5680

auth_backends.1 = oauth2
auth_backends.2 = internal

auth_oauth2.resource_server_id = rabbitmq
auth_oauth2.preferred_username_claims.1 = sub

# Static RSA signing key (no IdP needed).
auth_oauth2.default_key = test-key
auth_oauth2.signing_keys.test-key = /tmp/oauth2-test-rmq/signing_key_pub.pem

log.file.level = debug
