# OAuth 2 test node for CI (Docker).
# Uses the default port 5672 so the test suite needs no port override.

auth_backends.1 = oauth2
auth_backends.2 = internal

auth_oauth2.resource_server_id = rabbitmq
auth_oauth2.preferred_username_claims.1 = sub

auth_oauth2.default_key = test-key
auth_oauth2.signing_keys.test-key = /etc/rabbitmq/signing_key_pub.pem

log.file.level = debug
